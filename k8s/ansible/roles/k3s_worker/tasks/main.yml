- name: k3s 워커 조인
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ groups['master'][0] }}:6443 \
    K3S_TOKEN={{ hostvars[groups['master'][0]]['node_token']['content'] | b64decode | trim }} sh -
  args:
    creates: /usr/local/bin/k3s

- name: 워커 노드 격리 설정 (Taint)
  shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    NODE_NAME=$(kubectl get nodes --no-headers | grep -v control-plane | awk '{print $1}')
    kubectl taint nodes $NODE_NAME role=sandbox:NoSchedule --overwrite
  delegate_to: "{{ groups['master'][0] }}"
